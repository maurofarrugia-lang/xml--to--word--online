<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XML to Word Converter</title>

  <!-- Load DOCX.js correctly -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.2.1/docx.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      text-align: center;
      padding: 40px;
    }

    h2 {
      color: #1e3a8a;
      font-weight: 700;
    }

    #icon {
      font-size: 65px;
      margin-bottom: 20px;
      color: #2563eb;
    }

    .upload-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      border: 2px dashed #2563eb;
      width: 60%;
      margin: 20px auto;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-box:hover {
      background: #f0f7ff;
    }

    .button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.2s;
    }

    .button:hover {
      background: #1e40af;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

  <div id="icon">📄 ➜ 📘</div>

  <h2>Online XML → DOCX Converter</h2>

  <label class="upload-box">
    <input type="file" id="xmlFile" accept=".xml" style="display:none;">
    <strong>Click here to upload XML file</strong>
  </label>

  <button class="button" onclick="convert()">Convert to DOCX</button>

  <div id="status">⏳ Processing… please wait…</div>

  <script>
    async function convert() {
      const fileInput = document.getElementById("xmlFile");
      const status = document.getElementById("status");

      if (!fileInput.files.length) {
        alert("Please upload an XML file first.");
        return;
      }

      status.style.display = "block";
      status.style.color = "#d97706"; // orange

      await new Promise(resolve => setTimeout(resolve, 600)); // waiting animation

      const xmlText = await fileInput.files[0].text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");

      const { Document, Packer, Paragraph } = docx;

      const doc = new Document({
        sections: [{
          properties: {},
          children: []
        }]
      });

      // Convert XML to DOCX paragraphs
      function processNode(node, level = 0) {
        const tag = node.nodeName;
        const text = (node.textContent || "").trim();

        doc.sections[0].children.push(
          new Paragraph(`${"   ".repeat(level)}${tag}: ${text}`)
        );

        [...node.children].forEach(child => processNode(child, level + 1));
      }

      processNode(xmlDoc.documentElement);

      // Create and download DOCX
      const blob = await Packer.toBlob(doc);
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "converted.docx";
      link.click();

      status.textContent = "✅ Done! Your Word file is downloading.";
      status.style.color = "#16a34a"; // green
    }
  </script>

</body>
</html>
